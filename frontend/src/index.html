<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עולם דיגיטלי כלכלי קהילתי</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="screen active">
    <canvas id="stars-canvas"></canvas>
    <div class="earth-scene">
      <div class="earth-glow-outer"></div>
      <div class="earth-glow-mid"></div>
      <div class="earth-globe"></div>
      <div class="earth-atmosphere"></div>
      <div class="earth-clouds"></div>
    </div>
    <div class="scanlines"></div>

    <!-- Left panel — title + auth stacked, no overlap -->
    <div class="login-left">
      <div class="title-block">
        <div class="title-eyebrow">ברוך הבא אל</div>
        <h1 class="main-title">עולם דיגיטלי</h1>
        <div class="title-tagline">כלכלה קהילתית &nbsp;•&nbsp; רובוטיקה &nbsp;•&nbsp; בנייה &nbsp;•&nbsp; מסחר</div>
      </div>

      <div class="auth-dock">
        <!-- Google Sign-In (primary) -->
        <button class="google-btn" id="btn-google-signin">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>המשך עם Google</span>
        </button>

        <div class="auth-divider"><span>או</span></div>

        <!-- Email / Password fallback -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">כניסה</button>
          <button class="auth-tab" data-tab="register">הרשמה</button>
        </div>

        <form id="login-form" class="auth-form active">
          <div class="field-wrap">
            <span class="field-icon">✉</span>
            <input type="email" id="login-email" placeholder="אימייל" required />
          </div>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input type="password" id="login-password" placeholder="סיסמה" required />
          </div>
          <button type="submit" class="enter-btn">
            <span class="enter-btn-text">כניסה לעולם</span>
            <span class="enter-btn-arrow">→</span>
          </button>
        </form>

        <form id="register-form" class="auth-form">
          <div class="field-wrap">
            <span class="field-icon">👤</span>
            <input type="text" id="reg-username" placeholder="שם משתמש" required />
          </div>
          <div class="field-wrap">
            <span class="field-icon">✉</span>
            <input type="email" id="reg-email" placeholder="אימייל" required />
          </div>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input type="password" id="reg-password" placeholder="סיסמה" required />
          </div>
          <button type="submit" class="enter-btn">
            <span class="enter-btn-text">הצטרף לעולם</span>
            <span class="enter-btn-arrow">→</span>
          </button>
        </form>
      </div>
    </div>

    <div class="corner-version">v0.1 MVP</div>
  </div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen" class="screen">
    <div class="earth-zoom">
      <div class="earth-globe"></div>
      <div class="zoom-text">
        <p>טוען את העולם...</p>
        <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <!-- Three.js World (replaced by UE5 Pixel Streaming in production) -->
    <div id="world-container"></div>

    <!-- Crosshair -->
    <div id="crosshair">+</div>

    <!-- HUD -->
    <div id="hud">
      <!-- Top Bar -->
      <div id="hud-top">
        <div id="player-info">
          <div class="avatar-circle" id="player-avatar">👤</div>
          <div class="player-details">
            <span id="player-name">שחקן</span>
            <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
            <span id="player-level">רמה 1</span>
          </div>
        </div>
        <div id="token-display">
          <span class="token-icon">🪙</span>
          <span id="token-amount">0</span>
          <span class="token-label">טוקנים</span>
        </div>
        <div id="world-time">
          <span id="time-display">🌅 בוקר</span>
        </div>
      </div>

      <!-- Resource Bar -->
      <div id="resource-bar">
        <div class="resource-item" data-resource="wood">
          <span class="res-icon">🪵</span>
          <span class="res-count" id="res-wood">0</span>
        </div>
        <div class="resource-item" data-resource="stone">
          <span class="res-icon">🪨</span>
          <span class="res-count" id="res-stone">0</span>
        </div>
        <div class="resource-item" data-resource="iron">
          <span class="res-icon">⚙️</span>
          <span class="res-count" id="res-iron">0</span>
        </div>
        <div class="resource-item" data-resource="water">
          <span class="res-icon">💧</span>
          <span class="res-count" id="res-water">0</span>
        </div>
        <div class="resource-item" data-resource="wheat">
          <span class="res-icon">🌾</span>
          <span class="res-count" id="res-wheat">0</span>
        </div>
      </div>

      <!-- Action Bar — game hotbar style -->
      <div id="action-bar">
        <div class="hotbar-slot" id="btn-inventory" data-key="1">
          <div class="hotbar-key">1</div>
          <div class="hotbar-icon">🎒</div>
          <div class="hotbar-label">תיק</div>
        </div>
        <div class="hotbar-slot" id="btn-market" data-key="2">
          <div class="hotbar-key">2</div>
          <div class="hotbar-icon">🏪</div>
          <div class="hotbar-label">שוק</div>
        </div>
        <div class="hotbar-slot" id="btn-robots" data-key="3">
          <div class="hotbar-key">3</div>
          <div class="hotbar-icon">🤖</div>
          <div class="hotbar-label">רובוטים</div>
        </div>
        <div class="hotbar-slot" id="btn-farm" data-key="4">
          <div class="hotbar-key">4</div>
          <div class="hotbar-icon">🌾</div>
          <div class="hotbar-label">חקלאות</div>
        </div>
        <div class="hotbar-slot" id="btn-build" data-key="5">
          <div class="hotbar-key">B</div>
          <div class="hotbar-icon">🏗️</div>
          <div class="hotbar-label">בנייה</div>
        </div>
        <div class="hotbar-slot" id="btn-quests" data-key="6">
          <div class="hotbar-key">6</div>
          <div class="hotbar-icon">📋</div>
          <div class="hotbar-label">משימות</div>
        </div>
        <div class="hotbar-slot" id="btn-map" data-key="7">
          <div class="hotbar-key">7</div>
          <div class="hotbar-icon">🗺️</div>
          <div class="hotbar-label">מפה</div>
        </div>
      </div>

      <!-- Mini Map -->
      <div id="mini-map">
        <canvas id="mini-map-canvas" width="150" height="150"></canvas>
        <div id="player-dot"></div>
      </div>

      <!-- Notification Area -->
      <div id="notifications"></div>
    </div>

    <!-- PANELS — slide in from right -->
    <div id="panel-inventory" class="game-panel hidden">
      <div class="panel-header">
        <button class="panel-close">✕</button>
        <h2>🎒 תיק</h2>
      </div>
      <div class="panel-body">
        <div id="inventory-grid"></div>
      </div>
    </div>

    <div id="panel-market" class="game-panel hidden">
      <div class="panel-header">
        <button class="panel-close">✕</button>
        <h2>🏪 שוק</h2>
      </div>
      <div class="panel-tabs">
        <button class="tab-btn active" data-tab="buy">🛒 קנייה</button>
        <button class="tab-btn" data-tab="sell">💰 מכירה</button>
      </div>
      <div class="panel-body" id="market-listings"></div>
    </div>

    <div id="panel-robots" class="game-panel hidden">
      <div class="panel-header">
        <button class="panel-close">✕</button>
        <h2>🤖 רובוטים</h2>
      </div>
      <div class="panel-body" id="robots-list"></div>
    </div>

    <div id="panel-quests" class="game-panel hidden">
      <div class="panel-header">
        <button class="panel-close">✕</button>
        <h2>📋 משימות</h2>
      </div>
      <div class="panel-body" id="quests-list"></div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
